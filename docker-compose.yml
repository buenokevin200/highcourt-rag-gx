services:
  chromadb:
    image: chromadb/chroma:0.5.23
    container_name: hcourt-chromadb
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
      - ANONYMIZED_TELEMETRY=FALSE
    ports:
      - "8001:8000"
    restart: unless-stopped
    networks:
      - hcourt-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hcourt-backend
    depends_on:
      - chromadb
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8001
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=${DEBUG:-false}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./data/hcourt.db}
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped
    networks:
      - hcourt-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hcourt-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - hcourt-network

volumes:
  chroma_data:
  backend_data:

networks:
  hcourt-network:
    driver: bridge
